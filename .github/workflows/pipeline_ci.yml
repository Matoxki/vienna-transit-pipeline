name: Pipeline CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Data Engineering Tools
        run: |
          pip install dbt-bigquery
          pip install -r requirements.txt

      - name: Verify dbt Installation
        run: dbt --version